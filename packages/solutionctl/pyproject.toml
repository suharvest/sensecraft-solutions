[project]
name = "solutionctl"
version = "0.1.0"
description = "Thin public-side client for the SenseCraft Solution engine binary"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Seeed Studio" }]
keywords = ["sensecraft", "solution", "iot", "cli"]

# Zero engine code. Networking uses the stdlib (urllib) so the thin client has
# no third-party runtime dependency beyond Python itself.
dependencies = []

[project.scripts]
solutionctl = "solutionctl.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/solutionctl"]
