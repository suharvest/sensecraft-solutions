[project]
name = "sensecraft-solutionctl"
version = "0.1.0"
description = "Thin public-side client for the SenseCraft Solution engine binary"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Seeed Studio" }]
keywords = ["sensecraft", "solution", "iot", "cli"]

# Networking uses the stdlib (urllib) so the thin client has no third-party
# runtime dependency for the engine-driven commands. The offline ``validate``
# command needs jsonschema + pyyaml (contract-file checks) and the parser
# subpackage (guide.md step-type checks) — all engine-free.
dependencies = [
    "jsonschema>=4",
    "pyyaml>=6",
    "sensecraft-solution-spec",
]

[project.scripts]
solutionctl = "solutionctl.cli:main"

[project.urls]
Homepage = "https://github.com/suharvest/sensecraft-solutions"
Repository = "https://github.com/suharvest/sensecraft-solutions"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/solutionctl"]

[tool.uv.sources]
sensecraft-solution-spec = { workspace = true }
