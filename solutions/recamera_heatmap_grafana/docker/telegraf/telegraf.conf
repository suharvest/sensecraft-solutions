[agent]
  interval = "5s"
  flush_interval = "5s"

# MQTT Consumer - receives detection data from all devices
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["heatmap/+/people_count", "heatmap/+/detections"]
  qos = 0
  data_format = "json"

  # Extract device_id from topic: heatmap/{device_id}/measurement_name
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "heatmap/+/+"
    tags = "_/device/_"
    measurement = "_/_/measurement"

# Write to InfluxDB
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "recamera-heatmap-token"
  organization = "seeed"
  bucket = "recamera"

# Rename fields to match existing schema
# heatmap/xxx/people_count → measurement "people_count" with fields unique_count, total_visitors
# heatmap/xxx/detections → measurement "heatmap_raw" with fields x_pct, y_pct, value
[[processors.rename]]
  [[processors.rename.replace]]
    measurement = "detections"
    dest = "heatmap_raw"
