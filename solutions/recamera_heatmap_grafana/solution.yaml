  links: {}
  presets:
    - id: recamera
      name: AI Camera Direct
      description: Plug in a reCamera and start tracking — built-in AI, no extra hardware
      device_groups:
        - id: camera
          name: AI Camera
          type: single
          required: true
          options:
            - device_ref: recamera
          default: recamera
          name_i18n:
            zh: AI 摄像头
        - id: server
          name: Backend Server
          type: single
          required: true
          options:
            - device_ref: recomputer_r1100
          default: recomputer_r1100
          name_i18n:
            zh: 后端服务器
      links:
        wiki: https://wiki.seeedstudio.com/cn/integration_of_real-time_heat_map_with_grafana_data_dashboard/
        github: https://github.com/xr686/reCamera-with-Heatmap
      name_i18n:
        zh: AI 摄像头直连
      description_i18n:
        zh: 接上 reCamera 就能用，摄像头自带 AI 识别，不需要额外设备
    - id: jetson
      name: Upgrade Existing Cameras
      description: Keep your current IP cameras, add an AI box to enable heatmap analytics
      device_groups:
        - id: jetson_device
          name: Jetson Edge Device
          type: single
          required: true
          options:
            - device_ref: recomputer_j40
            - device_ref: recomputer_j50
          default: recomputer_j40
          name_i18n:
            zh: Jetson 边缘设备
      links:
        github: https://github.com/bleaaach/yolo11-grafana-influxdb
      name_i18n:
        zh: 传统摄像头改造
      description_i18n:
        zh: 保留现有 IP 摄像头，加一台 AI 盒子就能开启热力图分析
  summary_i18n:
    zh: 看清哪个货架前人多、哪条过道没人走——支持 reCamera、IP 摄像头 + AI 盒子，按需选设备
  description_file_i18n:
    zh: description_zh.md
deployment:
  guide_file: guide.md
  selection_mode: sequential
  post_deployment:
    autostart:
      enabled: true
      mode: fullscreen
      url: http://localhost:3000
  guide_file_i18n:
    zh: guide_zh.md
