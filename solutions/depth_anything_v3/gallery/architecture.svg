<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="DeepStream on NVIDIA Jetson architecture diagram">
  <defs>
    <style>
      .title { font: 700 42px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #1f2a33; }
      .section { font: 600 22px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #24303a; }
      .label { font: 600 18px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #2d3a45; }
      .small { font: 500 15px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #3f4b55; }
      .tiny { font: 600 14px "Segoe UI", "Helvetica Neue", Arial, sans-serif; fill: #23401a; }
    </style>
    <marker id="arrowThin" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7985"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#76b900"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#eef1f4"/>

  <text x="800" y="66" text-anchor="middle" class="title">DeepStream on NVIDIA Jetson</text>

  <!-- Main SDK container -->
  <rect x="200" y="110" width="1200" height="540" rx="14" fill="#ffffff" stroke="#c9d1d8" stroke-width="2"/>
  <text x="800" y="154" text-anchor="middle" class="section">DeepStream SDK on Jetson</text>

  <!-- REST API layer -->
  <rect x="240" y="170" width="1120" height="58" rx="8" fill="#f7f9fb" stroke="#d8dfe5" stroke-width="1.5"/>
  <text x="800" y="206" text-anchor="middle" class="label">REST APIs</text>

  <!-- Pipeline layer -->
  <rect x="240" y="248" width="1120" height="246" rx="10" fill="#fbfcfd" stroke="#d8dfe5" stroke-width="1.5"/>

  <rect x="250" y="290" width="126" height="82" rx="8" fill="#ffffff" stroke="#d1d8df" stroke-width="1.5"/>
  <text x="313" y="322" text-anchor="middle" class="small">Multi-Camera</text>
  <text x="313" y="343" text-anchor="middle" class="small">Input</text>

  <rect x="389" y="290" width="126" height="82" rx="8" fill="#ffffff" stroke="#d1d8df" stroke-width="1.5"/>
  <text x="452" y="322" text-anchor="middle" class="small">Capturing and</text>
  <text x="452" y="343" text-anchor="middle" class="small">Decoding</text>

  <rect x="528" y="290" width="126" height="82" rx="8" fill="#ffffff" stroke="#d1d8df" stroke-width="1.5"/>
  <text x="591" y="322" text-anchor="middle" class="small">Stream Muxing</text>
  <text x="591" y="343" text-anchor="middle" class="small">and Batching</text>

  <rect x="667" y="290" width="126" height="82" rx="8" fill="#ffffff" stroke="#d1d8df" stroke-width="1.5"/>
  <text x="730" y="333" text-anchor="middle" class="small">Preprocessing</text>

  <rect x="806" y="290" width="126" height="82" rx="8" fill="#f4faee" stroke="#76b900" stroke-width="2"/>
  <text x="869" y="317" text-anchor="middle" class="small">AI Inference</text>
  <text x="869" y="338" text-anchor="middle" class="small">(TensorRT /</text>
  <text x="869" y="359" text-anchor="middle" class="small">Triton)</text>

  <rect x="945" y="290" width="126" height="82" rx="8" fill="#ffffff" stroke="#d1d8df" stroke-width="1.5"/>
  <text x="1008" y="333" text-anchor="middle" class="small">Tracking</text>

  <rect x="1084" y="290" width="126" height="82" rx="8" fill="#ffffff" stroke="#d1d8df" stroke-width="1.5"/>
  <text x="1147" y="322" text-anchor="middle" class="small">Message Brokers</text>
  <text x="1147" y="343" text-anchor="middle" class="small">and Analytics</text>

  <rect x="1223" y="290" width="126" height="82" rx="8" fill="#ffffff" stroke="#d1d8df" stroke-width="1.5"/>
  <text x="1286" y="322" text-anchor="middle" class="small">Composing /</text>
  <text x="1286" y="343" text-anchor="middle" class="small">Display</text>

  <line x1="376" y1="331" x2="389" y2="331" stroke="#6b7985" stroke-width="1.4" marker-end="url(#arrowThin)"/>
  <line x1="515" y1="331" x2="528" y2="331" stroke="#6b7985" stroke-width="1.4" marker-end="url(#arrowThin)"/>
  <line x1="654" y1="331" x2="667" y2="331" stroke="#6b7985" stroke-width="1.4" marker-end="url(#arrowThin)"/>
  <line x1="793" y1="331" x2="806" y2="331" stroke="#6b7985" stroke-width="1.4" marker-end="url(#arrowThin)"/>
  <line x1="932" y1="331" x2="945" y2="331" stroke="#6b7985" stroke-width="1.4" marker-end="url(#arrowThin)"/>
  <line x1="1071" y1="331" x2="1084" y2="331" stroke="#6b7985" stroke-width="1.4" marker-end="url(#arrowThin)"/>
  <line x1="1210" y1="331" x2="1223" y2="331" stroke="#6b7985" stroke-width="1.4" marker-end="url(#arrowThin)"/>

  <!-- Left inputs -->
  <rect x="32" y="278" width="148" height="58" rx="8" fill="#ffffff" stroke="#d0d8de" stroke-width="1.2"/>
  <rect x="32" y="354" width="148" height="58" rx="8" fill="#ffffff" stroke="#d0d8de" stroke-width="1.2"/>
  <rect x="32" y="430" width="148" height="58" rx="8" fill="#ffffff" stroke="#d0d8de" stroke-width="1.2"/>
  <text x="106" y="314" text-anchor="middle" class="small">Cameras</text>
  <text x="106" y="390" text-anchor="middle" class="small">RTSP Streams</text>
  <text x="106" y="466" text-anchor="middle" class="small">Sensors</text>
  <line x1="180" y1="307" x2="250" y2="320" stroke="#6b7985" stroke-width="1.3" marker-end="url(#arrowThin)"/>
  <line x1="180" y1="383" x2="250" y2="331" stroke="#6b7985" stroke-width="1.3" marker-end="url(#arrowThin)"/>
  <line x1="180" y1="459" x2="250" y2="344" stroke="#6b7985" stroke-width="1.3" marker-end="url(#arrowThin)"/>

  <!-- Right outputs -->
  <rect x="1420" y="250" width="152" height="50" rx="8" fill="#ffffff" stroke="#d0d8de" stroke-width="1.2"/>
  <rect x="1420" y="314" width="152" height="50" rx="8" fill="#ffffff" stroke="#d0d8de" stroke-width="1.2"/>
  <rect x="1420" y="378" width="152" height="50" rx="8" fill="#ffffff" stroke="#d0d8de" stroke-width="1.2"/>
  <rect x="1420" y="442" width="152" height="50" rx="8" fill="#ffffff" stroke="#d0d8de" stroke-width="1.2"/>
  <rect x="1420" y="506" width="152" height="50" rx="8" fill="#ffffff" stroke="#d0d8de" stroke-width="1.2"/>
  <text x="1496" y="282" text-anchor="middle" class="small">Monitor</text>
  <text x="1496" y="346" text-anchor="middle" class="small">Alert System</text>
  <text x="1496" y="410" text-anchor="middle" class="small">Robot / Actuation</text>
  <text x="1496" y="474" text-anchor="middle" class="small">Analytics Dashboard</text>
  <text x="1496" y="538" text-anchor="middle" class="small">Cloud Service</text>
  <line x1="1349" y1="331" x2="1420" y2="275" stroke="#6b7985" stroke-width="1.2" marker-end="url(#arrowThin)"/>
  <line x1="1349" y1="331" x2="1420" y2="339" stroke="#6b7985" stroke-width="1.2" marker-end="url(#arrowThin)"/>
  <line x1="1349" y1="331" x2="1420" y2="403" stroke="#6b7985" stroke-width="1.2" marker-end="url(#arrowThin)"/>
  <line x1="1349" y1="331" x2="1420" y2="467" stroke="#6b7985" stroke-width="1.2" marker-end="url(#arrowThin)"/>
  <line x1="1349" y1="331" x2="1420" y2="531" stroke="#6b7985" stroke-width="1.2" marker-end="url(#arrowThin)"/>

  <!-- Hardware acceleration row -->
  <text x="250" y="522" class="label">Jetson Hardware Acceleration</text>
  <rect x="250" y="538" width="110" height="46" rx="6" fill="#e4f4dc" stroke="#76b900" stroke-width="1.4"/>
  <rect x="372" y="538" width="110" height="46" rx="6" fill="#e4f4dc" stroke="#76b900" stroke-width="1.4"/>
  <rect x="494" y="538" width="110" height="46" rx="6" fill="#e4f4dc" stroke="#76b900" stroke-width="1.4"/>
  <rect x="616" y="538" width="110" height="46" rx="6" fill="#e4f4dc" stroke="#76b900" stroke-width="1.4"/>
  <rect x="738" y="538" width="110" height="46" rx="6" fill="#e4f4dc" stroke="#76b900" stroke-width="1.4"/>
  <rect x="860" y="538" width="110" height="46" rx="6" fill="#e4f4dc" stroke="#76b900" stroke-width="1.4"/>
  <rect x="982" y="538" width="110" height="46" rx="6" fill="#e4f4dc" stroke="#76b900" stroke-width="1.4"/>
  <rect x="1104" y="538" width="110" height="46" rx="6" fill="#e4f4dc" stroke="#76b900" stroke-width="1.4"/>
  <rect x="1226" y="538" width="110" height="46" rx="6" fill="#e4f4dc" stroke="#76b900" stroke-width="1.4"/>
  <text x="305" y="567" text-anchor="middle" class="tiny">ISP</text>
  <text x="427" y="567" text-anchor="middle" class="tiny">GigE</text>
  <text x="549" y="567" text-anchor="middle" class="tiny">NVDEC</text>
  <text x="671" y="567" text-anchor="middle" class="tiny">GPU</text>
  <text x="793" y="567" text-anchor="middle" class="tiny">DLA</text>
  <text x="915" y="567" text-anchor="middle" class="tiny">CPU</text>
  <text x="1037" y="567" text-anchor="middle" class="tiny">PVA</text>
  <text x="1159" y="567" text-anchor="middle" class="tiny">VIC</text>
  <text x="1281" y="567" text-anchor="middle" class="tiny">NVENC</text>

  <!-- Jetson emphasis -->
  <rect x="500" y="672" width="600" height="110" rx="12" fill="#ffffff" stroke="#76b900" stroke-width="3"/>
  <rect x="532" y="706" width="130" height="42" rx="6" fill="#f3f8ef" stroke="#76b900" stroke-width="1.6"/>
  <rect x="684" y="706" width="130" height="42" rx="6" fill="#f3f8ef" stroke="#76b900" stroke-width="1.6"/>
  <rect x="836" y="706" width="130" height="42" rx="6" fill="#f3f8ef" stroke="#76b900" stroke-width="1.6"/>
  <text x="800" y="708" text-anchor="middle" class="label">NVIDIA Jetson Edge Device</text>
  <text x="800" y="766" text-anchor="middle" class="small">DeepStream pipeline executes on Jetson hardware at the edge</text>
  <line x1="800" y1="672" x2="800" y2="650" stroke="#76b900" stroke-width="2.2" marker-end="url(#arrowGreen)"/>

  <!-- Deployment section -->
  <text x="800" y="822" text-anchor="middle" class="section">Edge-to-Cloud Deployment</text>
  <rect x="500" y="840" width="200" height="52" rx="10" fill="#e4f4dc" stroke="#76b900" stroke-width="2.4"/>
  <rect x="760" y="840" width="170" height="52" rx="10" fill="#ffffff" stroke="#cbd4db" stroke-width="1.6"/>
  <rect x="990" y="840" width="170" height="52" rx="10" fill="#ffffff" stroke="#cbd4db" stroke-width="1.6"/>
  <text x="600" y="872" text-anchor="middle" class="label">Jetson Edge</text>
  <text x="845" y="872" text-anchor="middle" class="small">Workstation</text>
  <text x="1075" y="872" text-anchor="middle" class="small">Cloud</text>
  <text x="600" y="894" text-anchor="middle" class="tiny">Primary Deployment Target</text>
  <line x1="700" y1="866" x2="760" y2="866" stroke="#76b900" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="930" y1="866" x2="990" y2="866" stroke="#6b7985" stroke-width="1.6" marker-end="url(#arrowThin)"/>
</svg>
