version: "1.0"
id: preview_depth
name: Depth Stream Preview
type: video_stream

video:
  type: rtsp_proxy

display:
  aspect_ratio: "16:9"
  auto_start: false
  show_stats: true

behavior:
  stop_on_disconnect: true
  target_device_id: deploy_depth_anything
  action: stop_service

user_inputs:
  - id: rtsp_url
    name: RTSP URL
    type: text
    required: true
    default_template: "rtsp://{{host}}:8554/depth"
    default: "rtsp://192.168.1.100:8554/depth"
    placeholder: "rtsp://<jetson-ip>:8554/depth"
    description: RTSP output URL from the Jetson inference pipeline
    name_i18n:
      zh: RTSP 地址
    description_i18n:
      zh: Jetson 端推理管线输出的 RTSP 地址
name_i18n:
  zh: 深度视频预览
