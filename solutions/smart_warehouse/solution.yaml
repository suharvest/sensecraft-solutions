version: '1.0'
id: smart_warehouse
name: Smart Warehouse Management
intro:
  summary: Voice-controlled warehouse - zero learning curve, real-time data, fully local deployment available.
  description_file: description.md
  cover_image: gallery/wms-watcher-scenario.png
  gallery:
    - type: image
      src: gallery/wms-watcher-scenario.png
      caption: Voice control warehouse system
      caption_i18n:
        zh: 语音控制仓库管理系统
    - type: image
      src: gallery/architecture.png
      caption: System architecture diagram
      caption_i18n:
        zh: 系统架构图
    - type: image
      src: gallery/xiaozhi-stock-in.png
      caption: Voice stock-in demo
      caption_i18n:
        zh: 语音入库演示
  category: voice_ai
  solution_type: solution

  input_requirements:
    - type: audio
      description: Audio input from SenseCAP Watcher microphone
      description_i18n:
        zh: 来自 SenseCAP Watcher 麦克风的音频输入
    - type: network
      description: LAN or internet connectivity for cloud/private cloud services
      description_i18n:
        zh: 用于云服务或私有云服务的 LAN/互联网连接
  tags:
    - mcp
    - voice
    - watcher
    - integration
    - warehouse

  includes_demos:
    - jetson_voice_assistant

