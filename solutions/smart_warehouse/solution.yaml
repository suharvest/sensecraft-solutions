      product_url: https://www.seeedstudio.com/reComputer-R1100-4-POE-ports-powered-by-Raspberry-Pi-CM4-p-6203.html
      description: Edge gateway, runs warehouse management system
      name_i18n:
        zh: reComputer R1125-10
      description_i18n:
        zh: 边缘网关，运行仓库管理系统
    recomputer_r2135:
      name: reComputer R2135-12
