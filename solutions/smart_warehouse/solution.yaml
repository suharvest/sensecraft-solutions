    github: https://github.com/suharvest/warehouse_system
  presets:
    - id: trial
      name: Trial · Starter
      description: Watcher only, cloud-hosted by Seeed, no host required
      device_groups:
        - id: watcher
          name: Voice Assistant
          type: single
          required: true
          options:
            - device_ref: sensecap_watcher
          default: sensecap_watcher
          name_i18n:
            zh: 语音助手
      name_i18n:
        zh: 试用套餐 · 体验版
      description_i18n:
        zh: 只需一台 Watcher，无需主机，数据托管在 Seeed 云端，不支持人脸识别
    - id: sensecraft_cloud
      name: Tier 1 · Basic
      badge: Recommended
      description: Connect to SenseCraft cloud, quick setup and low cost, no high-accuracy face recognition
      architecture_image: gallery/architecture-cloud.png
      device_groups:
        - id: watcher
          name: Voice Assistant
          type: single
          required: true
          options:
            - device_ref: sensecap_watcher
          default: sensecap_watcher
          name_i18n:
            zh: 语音助手
        - id: edge_gateway
          name: Edge Gateway
          type: single
          required: true
          options:
            - device_ref: recomputer_r1125
          default: recomputer_r1125
          name_i18n:
            zh: 边缘网关
      name_i18n:
        zh: 套餐一 · 基础版
      badge_i18n:
        zh: 推荐
      description_i18n:
        zh: 需要外网 · 连接 SenseCraft 云服务 · 快速部署、低成本起步，不支持高精度人脸识别
    - id: private_cloud
      name: Tier 2A · Advanced (Single Site)
      description: Self-hosted AI, supports face recognition, single voice channel
      device_groups:
        - id: watcher
          name: Voice Assistant
          type: single
          required: true
          options:
            - device_ref: sensecap_watcher
          default: sensecap_watcher
          name_i18n:
            zh: 语音助手
        - id: edge_gateway
          name: Edge Gateway
          type: single
          required: true
          options:
            - device_ref: recomputer_r2135
          default: recomputer_r2135
          name_i18n:
            zh: 边缘网关
      name_i18n:
        zh: 套餐二A · 升级版（单点位）
      description_i18n:
        zh: 需要外网 · 本地 AI 服务 · 支持人脸识别 · 单点位语音
    - id: private_cloud_multi
      name: Tier 2B · Advanced (Multi Site)
      description: Self-hosted AI, supports face recognition, multi-channel concurrent voice
      device_groups:
        - id: watcher
          name: Voice Assistant
          type: single
          required: true
          options:
            - device_ref: sensecap_watcher
          default: sensecap_watcher
          name_i18n:
            zh: 语音助手
        - id: edge_gateway
          name: Edge Gateway
          type: single
          required: true
          options:
            - device_ref: recomputer_r2135
          default: recomputer_r2135
          name_i18n:
            zh: 边缘网关
        - id: ai_compute
          name: AI Compute
          type: single
          required: true
          options:
            - device_ref: recomputer_super_j4012
          default: recomputer_super_j4012
          name_i18n:
            zh: AI 算力
      name_i18n:
        zh: 套餐二B · 升级版（多点位）
      description_i18n:
        zh: 需要外网 · 本地 AI 服务 · 支持人脸识别 · 多路语音并发
    - id: edge_computing
      name: Tier 3 · Premium
      description: Pure LAN, fully offline, supports face recognition
      device_groups:
        - id: watcher
          name: Voice Assistant
          type: single
          required: true
          options:
            - device_ref: sensecap_watcher
          default: sensecap_watcher
          name_i18n:
            zh: 语音助手
        - id: edge_gateway
          name: Edge Gateway
          type: single
          required: true
          options:
            - device_ref: recomputer_r2135
          default: recomputer_r2135
          name_i18n:
            zh: 边缘网关
        - id: ai_compute
          name: AI Compute
          type: single
          required: true
          options:
            - device_ref: recomputer_j50
          default: recomputer_j50
          name_i18n:
            zh: AI 算力
      name_i18n:
        zh: 套餐三 · 顶配版
      description_i18n:
        zh: 纯局域网 · 数据不出厂区 · 完全离线 · 支持人脸识别
