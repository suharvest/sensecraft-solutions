        - value: volcengine
          label: Volcengine (火山引擎)
          label_i18n:
            zh: 火山引擎
        - value: aliyun
          label: Aliyun (阿里云)
          label_i18n:
            zh: 阿里云
        - value: edge
          label: Edge TTS (Free)
          label_i18n:
            zh: Edge TTS（免费）
      default: edge
      description: "Choose TTS service provider"
      show_when:
        field: deploy_mode
        value: private_cloud

      name_i18n:
        zh: TTS 服务商
      description_i18n:
        zh: "选择 TTS 服务商"
    - id: tts_base_url
      name: TTS API Base URL
      type: text
      required: false
      row: 2
      placeholder: "https://api.openai.com/v1"
      description: "Not needed for Edge TTS"
      show_when:
        field: deploy_mode
        value: private_cloud

      name_i18n:
        zh: TTS API 地址
      description_i18n:
        zh: "Edge TTS 不需要"
    - id: tts_api_key
      name: TTS API Key
      type: password
      required: false
      row: 2
      placeholder: "sk-..."
      description: "Not needed for Edge TTS"
      show_when:
        field: deploy_mode
        value: private_cloud

      name_i18n:
        zh: TTS API 密钥
      description_i18n:
        zh: "Edge TTS 不需要"
    - id: tts_voice
      name: TTS Voice
      type: text
