version: "1.0"
id: xiaozhi_deploy
name: Xiaozhi Voice Server
type: docker_deploy

# Unified docker_deploy YAML — backend derives docker_local + docker_remote
# views via derive_docker_views().

detection:
  method: local
  requirements:
    - docker_installed
    - docker_running
    - docker_compose_installed

docker:
  compose_file: assets/docker/docker-compose-xiaozhi.yml

  environment:
    TZ: Asia/Shanghai

  options:
    project_name: xiaozhi_voice
    remove_orphans: true
    build: false

  services:
    - name: xiaozhi-server
      port: 18000
      health_check_endpoint: /xiaozhi/ota/
      health_check_port: 18003
      required: true
    - name: mcp-endpoint
      port: 18004
      required: true

user_inputs:
  # 部署方案选择
  - id: deploy_mode
    name: Deployment Mode
    type: select
    required: true
    row: 1
    options:
      - value: private_cloud
        label: Private Cloud (Cloud LLM/TTS)
        label_i18n:
          zh: 私有云方案（云端 LLM/TTS）
      - value: edge_computing
        label: Edge Computing (Jetson LLM/TTS)
        label_i18n:
          zh: 边缘计算方案（Jetson LLM/TTS）
    default: private_cloud
    description: Choose deployment architecture
    name_i18n:
      zh: 部署方案
    description_i18n:
      zh: 选择部署架构
  - id: llm_base_url
    name: LLM API Base URL
    type: text
    required: false
    row: 1
    placeholder: "https://api.deepseek.com/v1"
    description: "OpenAI-compatible API endpoint"
    show_when:
      field: deploy_mode
      value: private_cloud

    name_i18n:
      zh: LLM API 地址
    description_i18n:
      zh: "兼容 OpenAI 的 API 端点"
  - id: llm_model_name
    name: LLM Model Name
    type: text
    required: false
    row: 1
    placeholder: "deepseek-chat"
    description: "Model name to use"
    show_when:
      field: deploy_mode
      value: private_cloud

    name_i18n:
      zh: LLM 模型名称
    description_i18n:
      zh: "使用的模型名称"
  - id: llm_api_key
    name: LLM API Key
    type: password
    required: false
    row: 1
    placeholder: "sk-..."
    description: "API key for LLM service"
    show_when:
      field: deploy_mode
      value: private_cloud

  # 私有云方案 - TTS 配置
    name_i18n:
      zh: LLM API 密钥
    description_i18n:
      zh: "LLM 服务的 API 密钥"
  - id: tts_type
    name: TTS Provider
    type: select
    required: false
    row: 2
    options:
      - value: openai
        label: OpenAI TTS
        label_i18n:
          zh: OpenAI TTS
      - value: azure
        label: Azure Speech
        label_i18n:
          zh: Azure 语音
      - value: volcengine
        label: Volcengine (火山引擎)
        label_i18n:
          zh: 火山引擎
      - value: aliyun
        label: Aliyun (阿里云)
        label_i18n:
          zh: 阿里云
      - value: edge
        label: Edge TTS (Free)
        label_i18n:
          zh: Edge TTS（免费）
    default: edge
    description: "Choose TTS service provider"
    show_when:
      field: deploy_mode
      value: private_cloud

    name_i18n:
      zh: TTS 服务商
    description_i18n:
      zh: "选择 TTS 服务商"
  - id: tts_base_url
    name: TTS API Base URL
    type: text
    required: false
    row: 2
    placeholder: "https://api.openai.com/v1"
    description: "Not needed for Edge TTS"
    show_when:
      field: deploy_mode
      value: private_cloud

    name_i18n:
      zh: TTS API 地址
    description_i18n:
      zh: "Edge TTS 不需要"
  - id: tts_api_key
    name: TTS API Key
    type: password
    required: false
    row: 2
    placeholder: "sk-..."
    description: "Not needed for Edge TTS"
    show_when:
      field: deploy_mode
      value: private_cloud

    name_i18n:
      zh: TTS API 密钥
    description_i18n:
      zh: "Edge TTS 不需要"
  - id: tts_voice
    name: TTS Voice
    type: text
    required: false
    row: 2
    placeholder: "zh-CN-XiaoxiaoNeural"
    description: "Voice ID or name"
    default: "zh-CN-XiaoxiaoNeural"
    show_when:
      field: deploy_mode
      value: private_cloud

  # 边缘计算方案 - Jetson 配置
    name_i18n:
      zh: TTS 语音
    description_i18n:
      zh: "语音 ID 或名称"
  - id: jetson_ip
    name: Jetson IP Address
    type: text
    required: false
    placeholder: "192.168.1.200"
    description: "IP address of Jetson device running LLM/TTS (auto-filled if deployed in previous step)"
    show_when:
      field: deploy_mode
      value: edge_computing
    # 从 Jetson 部署步骤获取值
    import_from: JETSON_IP

    name_i18n:
      zh: Jetson IP 地址
    description_i18n:
      zh: "运行 LLM/TTS 的 Jetson 设备 IP 地址（如已在上一步部署则自动填充）"

pre_checks:
  - type: docker_version
    min_version: "20.0"
    description: Check Docker version
  - type: docker_compose_version
    min_version: "2.0"
    description: Check Docker Compose version
  - type: port_available
    ports:
      - 18000
      - 18003
      - 18004
    description: Check if ports are available
  - type: disk_space
    min_gb: 3
    description: Check available disk space

post_deployment:
  message: "Xiaozhi voice server is running. WebSocket: ws://localhost:18000/xiaozhi/v1/"
  message_i18n:
    zh: "小智语音服务已启动。WebSocket: ws://localhost:18000/xiaozhi/v1/"

# SSH defaults applied to derived remote view.
ssh:
  default_user: root

remote_overrides:
  remote_path: /home/{{username}}/xiaozhi_voice
  detection:
    method: network_scan
    manual_entry: true
    requirements:
      - docker_installed
      - docker_running
  pre_checks:
    - type: docker_version
      min_version: "20.0"
      description: Check Docker version
    - type: docker_compose_version
      min_version: "2.0"
      description: Check Docker Compose version
  post_deployment:
    message: "Xiaozhi voice server is running on {{host}}. WebSocket: ws://{{host}}:18000/xiaozhi/v1/"
    message_i18n:
      zh: "小智语音服务已在 {{host}} 上启动。WebSocket: ws://{{host}}:18000/xiaozhi/v1/"
  user_inputs:
    # SSH 连接配置
    - id: host
      name: Host / IP
      type: text
      required: true
      default: "reComputer-R110x.local"
      placeholder: "reComputer-R110x.local"
      description: Hostname or IP address of the reComputer R1100 device
      name_i18n:
        zh: 主机 / IP 地址
      description_i18n:
        zh: reComputer R1100 设备的主机名或 IP 地址
    - id: username
      name: SSH Username
      type: text
      default: recomputer
      required: true
      description: SSH login username
      name_i18n:
        zh: SSH 用户名
      description_i18n:
        zh: SSH 登录用户名
    - id: password
      name: SSH Password
      type: password
      default: "12345678"
      required: true
      description: SSH login password
      name_i18n:
        zh: SSH 密码
      description_i18n:
        zh: SSH 登录密码
    - id: port
      name: SSH Port
      type: text
      default: "22"
      required: false
      description: SSH port (default 22)
      name_i18n:
        zh: SSH 端口
      description_i18n:
        zh: SSH 端口（默认 22）
    - id: deploy_mode
      name: Deployment Mode
      type: select
      required: true
      row: 1
      options:
        - value: private_cloud
          label: Private Cloud (Cloud LLM/TTS)
          label_i18n:
            zh: 私有云方案（云端 LLM/TTS）
        - value: edge_computing
          label: Edge Computing (Jetson LLM/TTS)
          label_i18n:
            zh: 边缘计算方案（Jetson LLM/TTS）
      default: private_cloud
      description: Choose deployment architecture
      name_i18n:
        zh: 部署方案
      description_i18n:
        zh: 选择部署架构
    - id: llm_base_url
      name: LLM API Base URL
      type: text
      required: false
      row: 1
      placeholder: "https://api.deepseek.com/v1"
      description: "OpenAI-compatible API endpoint"
      show_when:
        field: deploy_mode
        value: private_cloud

      name_i18n:
        zh: LLM API 地址
      description_i18n:
        zh: "兼容 OpenAI 的 API 端点"
    - id: llm_model_name
      name: LLM Model Name
      type: text
      required: false
      row: 1
      placeholder: "deepseek-chat"
      description: "Model name to use"
      show_when:
        field: deploy_mode
        value: private_cloud

      name_i18n:
        zh: LLM 模型名称
      description_i18n:
        zh: "使用的模型名称"
    - id: llm_api_key
      name: LLM API Key
      type: password
      required: false
      row: 1
      placeholder: "sk-..."
      description: "API key for LLM service"
      show_when:
        field: deploy_mode
        value: private_cloud

    # 私有云方案 - TTS 配置
      name_i18n:
        zh: LLM API 密钥
      description_i18n:
        zh: "LLM 服务的 API 密钥"
    - id: tts_type
      name: TTS Provider
