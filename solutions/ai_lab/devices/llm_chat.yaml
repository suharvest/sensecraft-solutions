version: "1.0"
id: llm_chat
name: Chat
type: text_chat

text_chat:
  endpoint:
    method: POST
    url_template: "http://{{host}}:8001/v1/chat/completions"
    headers:
      Content-Type: application/json
  request_template: '{"model":"rkllm-model","messages":[{"role":"user","content":"{{input}}"}],"max_tokens":256,"stream":false}'
  response_path: "choices.0.message.content"
  stream:
    enabled: true
    request_override: '{"stream": true}'
    event_path: "choices.0.delta.content"
  placeholder: "Ask me anything..."
  placeholder_i18n:
    zh: "问我任何问题..."
user_inputs:
  - id: host
    name: Device IP
    type: text
    required: true
    placeholder: "192.168.1.100"
    name_i18n:
      zh: 设备 IP
name_i18n:
  zh: 对话
