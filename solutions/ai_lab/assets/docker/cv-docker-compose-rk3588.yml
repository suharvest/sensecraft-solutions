services:
  yolo-cv:
    image: ghcr.io/seeed-projects/recomputer-rk-cv/rk3588-yolo:latest
    container_name: ai_lab_cv
    privileged: true
    network_mode: host
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      RKNN_LOG_LEVEL: "0"
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /proc/device-tree/compatible:/proc/device-tree/compatible
      - /dev/dma_heap:/dev/dma_heap
    command: python web_detection.py --model_path model/${MODEL_VARIANT:-yolo11n}.rknn --host 0.0.0.0 --port 8000
