services:
  industrial-security-demo:
    image: sensecraft-missionpack.seeed.cn/solution/industrial-security-demo:v1.1
    container_name: industrial-security-demo
    runtime: nvidia
    # host networking exposes ports 8080 (HTTP + MJPEG /api/stream),
    # 8081 (video websocket), 8082 (config websocket) directly on the Jetson.
    network_mode: host
    privileged: true
    environment:
      - QT_QPA_PLATFORM=offscreen
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - LD_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu:/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}
    volumes:
      # External config injected by deployer (camera.source = user-provided RTSP URL)
      - ./config:/app/config:ro
      # Snapshots / event clips persisted on host
      - ./output:/app/output:rw
      # Host CUDA / TensorRT runtime libs (JetPack 6.x)
      - /usr/lib/aarch64-linux-gnu:/usr/lib/aarch64-linux-gnu:ro
      - /usr/local/cuda:/usr/local/cuda:ro
      - /usr/lib/tensorrt:/usr/lib/tensorrt:ro
      - /usr/lib/python3.10/dist-packages/tensorrt:/usr/lib/python3/dist-packages/tensorrt:ro
      - /usr/lib/python3.10/dist-packages/tensorrt_dispatch:/usr/lib/python3/dist-packages/tensorrt_dispatch:ro
      - /usr/lib/python3.10/dist-packages/tensorrt_lean:/usr/lib/python3/dist-packages/tensorrt_lean:ro
      # trtexec binary for fallback engine generation
      - /usr/src/tensorrt:/usr/src/tensorrt:ro
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvmap:/dev/nvmap
      - /dev/nvhost-ctrl:/dev/nvhost-ctrl
      - /dev/nvhost-ctrl-isp:/dev/nvhost-ctrl-isp
      - /dev/nvhost-vic:/dev/nvhost-vic
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8080)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
