version: "1.0"
id: jetson_deploy
name: NVIDIA Jetson
type: docker_deploy

# Single source-of-truth device YAML. Backend derives docker_local and
# docker_remote views via derive_docker_views().
#
# device_class=jetson pulls in shared Jetson pre-deploy fixes (iptables
# raw-table workaround for JetPack 6.x) and the hardware detection probe
# (test -f /etc/nv_tegra_release) from devices/profiles/jetson.yaml.
# The iptables action is scope=remote so it never fires on a developer
# Mac running docker_local; the detection probe runs on both views so
# misconfigured local deploys abort before any side effect.
device_class: jetson

docker:
  compose_file: assets/jetson/docker-compose.yml
  options:
    project_name: gpt_oss_20b
    remove_orphans: true
  services:
    - name: gpt_oss_20b
      port: 8080
      health_check_endpoint: /v1/models
      health_check_timeout: 600
      required: true

ssh:
  default_user: recomputer
  auth_methods:
    - password

user_inputs:
  - id: llama_ngl
    name: Llama NGL
    type: text
    default: "20"
    required: false
    description: GPU layers for llama-server (-ngl)
    name_i18n:
      zh: Llama NGL
    description_i18n:
      zh: llama-server 的 GPU 层数参数 (-ngl)
  - id: llama_ctx
    name: Llama Context
    type: text
    default: "1024"
    required: false
    description: Context window for llama-server (-c)
    name_i18n:
      zh: Llama Context
    description_i18n:
      zh: llama-server 的上下文窗口参数 (-c)

pre_checks:
  - type: disk_space
    min_gb: 20
    description: At least 20GB for LLM model and Docker image

post_deployment:
  open_browser: true
  url: http://localhost:8080

name_i18n:
  zh: NVIDIA Jetson

remote_overrides:
  remote_path: /home/{{username}}/got-oss-20b
  compose_dir: assets/jetson
  detection:
    method: network_scan
    manual_entry: true
  environment:
    LLAMA_NGL: "{{llama_ngl}}"
    LLAMA_CTX: "{{llama_ctx}}"
  post_deployment:
    open_browser: false
  actions:
    before:
      - name: Validate Jetson runtime
        run: |
          set -e

          [ -f /etc/nv_tegra_release ] || {
            echo "Not a Jetson device: /etc/nv_tegra_release is missing"
            exit 1
          }

          docker info >/dev/null 2>&1 || {
            echo "Docker is not available"
            exit 1
          }

          docker info | grep -Eq "Runtimes:.*nvidia| nvidia" || {
            echo "NVIDIA docker runtime is not detected"
            exit 1
          }

          L4T=$(sed -n 's/^# R\([0-9]\+\) (release), REVISION: \([0-9]\+\)\.\([0-9]\+\).*/\1.\2.\3/p' /etc/nv_tegra_release)
          case "$L4T" in
            36.4.0|36.4.3|36.4.4|"")
              ;;
            *)
              echo "Unsupported L4T version: $L4T (expected 36.4.0/36.4.3/36.4.4)"
              exit 1
              ;;
          esac

          FREE_GB=$(df -BG / | awk 'NR==2{gsub(/G/,"",$4); print $4}')
          [ "${FREE_GB:-0}" -ge 50 ] || {
            echo "Need at least 50GB free disk, current: ${FREE_GB:-0}GB"
            exit 1
          }

          MEM_GB=$(free -g | awk '/^Mem:/{print $2}')
          [ "${MEM_GB:-0}" -ge 14 ] || {
            echo "Need at least 14GB system memory, current: ${MEM_GB:-0}GB"
            exit 1
          }
        name_i18n:
          zh: Validate Jetson runtime
      - name: Ensure docker compose command
        sudo: true
        run: |
          set -e

          compose_ready() {
            docker compose version >/dev/null 2>&1 || docker-compose --version >/dev/null 2>&1
          }

          if compose_ready; then
            exit 0
          fi

          if command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_BIN="$(command -v docker-compose)"
            for d in \
              /usr/local/lib/docker/cli-plugins \
              /usr/lib/docker/cli-plugins \
              /usr/libexec/docker/cli-plugins
            do
              mkdir -p "$d"
              ln -sf "$COMPOSE_BIN" "$d/docker-compose" || true
            done
          fi

          if ! compose_ready && command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            for pkg in docker-compose-plugin docker-compose-v2 docker-compose; do
              if apt-get install -y "$pkg"; then
                break
              fi
            done
          fi

          if ! compose_ready && command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_BIN="$(command -v docker-compose)"
            for d in \
              /usr/local/lib/docker/cli-plugins \
              /usr/lib/docker/cli-plugins \
              /usr/libexec/docker/cli-plugins
            do
              mkdir -p "$d"
              ln -sf "$COMPOSE_BIN" "$d/docker-compose" || true
            done
          fi

          compose_ready || {
            echo "Docker Compose is unavailable. Need either 'docker compose' (v2 plugin) or 'docker-compose' (standalone)."
            exit 1
          }

        name_i18n:
          zh: Ensure docker compose command
