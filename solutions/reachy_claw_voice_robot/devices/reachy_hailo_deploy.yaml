version: "1.0"
id: reachy_hailo_deploy
name: Reachy Voice Robot Stack (Hailo)
type: docker_deploy

# Single source-of-truth device YAML. Backend derives docker_local and
# docker_remote views via derive_docker_views().
#
# device_class=hailo pulls in the Hailo hardware identity probes
# (hailo_pci kernel module + /dev/hailo0 device node) from
# devices/profiles/hailo.yaml. The full HailoRT user-space install
# (hailo-all metapackage + DKMS + 4K page-size override + udev wait)
# stays in remote_overrides.actions because this solution uses a
# Reachy-specific bootstrap recipe distinct from other Hailo solutions.
device_class: hailo

docker:
  compose_file: assets/docker/reachy_hailo/docker-compose.yml
  remote_path: /home/{{username}}/reachy-hailo-vision
  options:
    project_name: reachy-hailo-vision
  environment:
    DATA_DIR: "{{DATA_DIR}}"
    VOICE_ASSISTANT_HOST: "{{VOICE_ASSISTANT_HOST}}"
    LLM_ENDPOINT: "{{LLM_ENDPOINT}}"
  services:
    - name: reachy-daemon
      port: 38001
      health_check_endpoint: /
      required: true
    - name: reachy-voice
      port: 8042
      health_check_endpoint: /
      required: true
    - name: vision-hailo
      port: 8630
      health_check_endpoint: /
      required: true

ssh:
  port: 22
  default_user: pi

pre_checks:
  - type: disk_space
    min_gb: 5
    description: At least 5GB for Reachy Docker images

post_deployment:
  open_browser: true
  url: http://localhost:8042

name_i18n:
  zh: Reachy 语音机器人栈（Hailo）

user_inputs:
  - id: DATA_DIR
    name: Data Directory
    type: text
    default: "~/reachy-data"
    reconfigurable: true
    description: "Directory for persistent data (captures, face DB, etc.). Example: /mnt/usb/reachy-data"
    name_i18n:
      zh: 数据存储目录
    description_i18n:
      zh: "持久化数据目录（截图、人脸库等）。示例：/mnt/usb/reachy-data"
  - id: VOICE_ASSISTANT_HOST
    name: Voice Assistant Host (speech)
    type: text
    required: true
    description: "IP address of the Jetson running the speech service on port 8621 (e.g. 192.168.1.100)"
    name_i18n:
      zh: 语音助手主机（语音）
    description_i18n:
      zh: "运行语音服务（端口 8621）的 Jetson IP（例如 192.168.1.100）"
  - id: LLM_ENDPOINT
    name: LLM Endpoint
    type: text
    required: false
    reconfigurable: true
    placeholder: "http://192.168.1.100:11435/v1"
    description: "OpenAI-compatible LLM base URL — MUST include the /v1 path. Leave empty to use the bundled edge-llm (http://<VOICE_ASSISTANT_HOST>:11435/v1). Override with your own endpoint, e.g. http://host:11435/v1."
    name_i18n:
      zh: LLM 服务地址
    description_i18n:
      zh: "LLM API 的基础地址。OpenAI 兼容的 LLM 基础地址，必须包含 /v1 路径。留空则使用内置 edge-llm (http://<VOICE_ASSISTANT_HOST>:11435/v1)。可自定义为自己的 Ollama / OpenClaw 网关 / DashScope 或任何 OpenAI 兼容端点。"
  - id: ENABLE_KIOSK
    name: Enable Kiosk Mode
    type: select
    default: "false"
    reconfigurable: false
    description: "Auto-launch dashboard in fullscreen on device boot (for exhibition/kiosk use)"
    options:
      - value: "true"
        label: "Yes — auto-launch fullscreen dashboard on boot"
        label_i18n:
          zh: "是 — 开机自动全屏打开仪表盘"
      - value: "false"
        label: "No — manual access only"
        label_i18n:
          zh: "否 — 仅手动访问"
    name_i18n:
      zh: 启用全屏展示模式
    description_i18n:
      zh: "设备开机后自动全屏打开仪表盘（适用于展览/展示场景）"

remote_overrides:
  compose_dir: assets/docker/reachy_hailo
  actions:
    before:
      - name: Check Speech service (port 8621)
        run: |
          if curl -sf http://{{VOICE_ASSISTANT_HOST}}:8621/health >/dev/null 2>&1; then
            echo "Speech service is running on {{VOICE_ASSISTANT_HOST}}"
          else
            echo "ERROR: Speech service ({{VOICE_ASSISTANT_HOST}}:8621) is not reachable."
            echo "Please deploy the 'Jetson Local Voice Assistant' solution first,"
            echo "then re-run this deployment."
            exit 1
          fi
        name_i18n:
          zh: 检查语音服务（端口 8621）
      - name: Check LLM endpoint
        run: |
          # LLM_ENDPOINT is optional; if blank, fall back to the edge-llm
          # service on the voice assistant host. User can override to
          # OpenClaw gateway, DashScope, or any OpenAI-compatible URL. We
          # don't enforce a specific endpoint shape — just confirm the host
          # is reachable and responds with anything < 500.
          URL="{{LLM_ENDPOINT}}"
          if [ -z "$URL" ]; then
            URL="http://{{VOICE_ASSISTANT_HOST}}:11435"
            echo "LLM_ENDPOINT not set — defaulting to ${URL}"
          fi
          echo "Probing LLM endpoint: $URL"
          # Try a few common paths; any 2xx/3xx/4xx (i.e. server alive) is OK.
          for path in "" "/api/tags" "/v1/models"; do
            code=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 "${URL}${path}" 2>/dev/null || echo "")
            if [ -n "$code" ] && [ "$code" -lt 500 ] 2>/dev/null; then
              echo "LLM endpoint reachable (HTTP ${code} from ${URL}${path})"
              exit 0
            fi
          done
          echo "WARN: LLM endpoint $URL did not respond. Deployment will continue,"
          echo "but reachy-voice will fail to chat until the endpoint is reachable."
        name_i18n:
          zh: 检查 LLM 服务地址
      - name: Verify or install Hailo stack (hardware + driver + userspace)
        sudo: true
        timeout: 900
        run: |
          set -e
          HAILO_PY=/usr/lib/python3/dist-packages/hailo_platform
          HAILO_LIB=/usr/lib/aarch64-linux-gnu/libhailort.so.4

          # ── Fast path: everything already in place ──
          if [ -e /dev/hailo0 ] && [ -d "$HAILO_PY" ] && [ -e "$HAILO_LIB" ] \
             && lsmod | grep -q "^hailo_pci"; then
            INSTALLED=$(dpkg-query -W -f='${Version}' hailort 2>/dev/null || echo "?")
            echo "Hailo stack ready: HailoRT ${INSTALLED}, /dev/hailo0 present, userspace OK."
            exit 0
          fi

          echo "Hailo stack not fully installed — bootstrapping..."

          # ── Sanity-check the M.2 HAT is physically present ──
          if ! lspci 2>/dev/null | grep -qi "hailo"; then
            echo "ERROR: No Hailo PCIe device detected via lspci."
            echo "  - Is the Hailo-8 AI HAT seated in the M.2 slot?"
            echo "  - Did you enable PCIe Gen3 in /boot/firmware/config.txt?"
            echo "    (dtparam=pciex1_gen=3)"
            echo "Power off, reseat the HAT, reboot, then retry."
            exit 1
          fi

          # ── Ensure Raspberry Pi apt source is configured ──
          if ! apt-cache policy hailo-all 2>/dev/null | grep -q "Candidate:" \
             || apt-cache policy hailo-all 2>/dev/null | grep -q "Candidate: (none)"; then
            echo "Raspberry Pi apt source not active — adding it..."
            sudo apt-get install -y --no-install-recommends gnupg curl ca-certificates
            curl -fsSL http://archive.raspberrypi.com/debian/raspberrypi.gpg.key \
              | sudo gpg --dearmor -o /usr/share/keyrings/raspberrypi-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/raspberrypi-archive-keyring.gpg] http://archive.raspberrypi.com/debian bookworm main" \
              | sudo tee /etc/apt/sources.list.d/raspberrypi.list >/dev/null
            sudo apt-get update
          fi

          # ── Install hailo-all metapackage ──
          echo "Running: sudo apt-get install -y hailo-all  (this may take 5-10 min for DKMS build)"
          sudo apt-get install -y hailo-all || {
            echo "ERROR: hailo-all install failed."
            echo "Check: apt-cache policy hailo-all"
            exit 1
          }

          # ── Pin HailoRT version to prevent apt upgrades breaking self-contained container ──
          sudo apt-mark hold hailort hailort-pcie-driver || true

          # ── Load the PCIe driver with 4K page size override (HailoRT 4.21+ requires this) ──
          HAILO_MODPROBE_CONF=/etc/modprobe.d/hailo.conf
          if [ ! -f "$HAILO_MODPROBE_CONF" ] || ! grep -q "force_desc_page_size=4096" "$HAILO_MODPROBE_CONF" 2>/dev/null; then
            echo "Setting hailo_pci kernel module option: force_desc_page_size=4096"
            sudo mkdir -p /etc/modprobe.d
            echo 'options hailo_pci force_desc_page_size=4096' | sudo tee "$HAILO_MODPROBE_CONF" >/dev/null
          fi
          sudo rmmod hailo_pci 2>/dev/null || true
          sudo modprobe hailo_pci
          if ! lsmod | grep -q "^hailo_pci"; then
            echo "WARN: hailo_pci kernel module not loaded after install."
            echo "  This usually means a reboot is required for DKMS to finalize."
            echo "  Reboot the device and re-run this deployment."
            exit 1
          fi

          # ── Wait for /dev/hailo0 to appear (udev) ──
          for i in $(seq 1 10); do
            [ -e /dev/hailo0 ] && break
            sleep 1
          done

          # ── Final verification — every path the container will bind-mount ──
          MISSING=0
          for p in /dev/hailo0 "$HAILO_PY" "$HAILO_LIB"; do
            if [ ! -e "$p" ]; then
              echo "MISSING after install: $p"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "ERROR: Hailo install completed but required paths missing — try rebooting."
            exit 1
          fi
          INSTALLED=$(dpkg-query -W -f='${Version}' hailort 2>/dev/null || echo "?")
          echo "Hailo stack installed: HailoRT ${INSTALLED}, /dev/hailo0 present, userspace OK."
        name_i18n:
          zh: 检测或安装 Hailo 软硬件栈（硬件 + 驱动 + 用户态）
      - name: Configure USB power (disable autosuspend on Reachy devices)
        run: |
          RULE_FILE=/etc/udev/rules.d/99-reachy-usb-no-autosuspend.rules
          RULE_CONTENT='# Reachy Mini — keep USB peripherals powered (no autosuspend).
          SUBSYSTEM=="usb", ATTR{idVendor}=="38fb", ATTR{idProduct}=="1002", ATTR{power/control}="on", ATTR{power/autosuspend_delay_ms}="-1"
          SUBSYSTEM=="usb", ATTR{idVendor}=="38fb", ATTR{idProduct}=="1001", ATTR{power/control}="on", ATTR{power/autosuspend_delay_ms}="-1"'
          if [ ! -f "$RULE_FILE" ] || ! grep -q '38fb' "$RULE_FILE"; then
            echo "Installing udev rule: $RULE_FILE"
            echo "$RULE_CONTENT" | sudo tee "$RULE_FILE" > /dev/null
            sudo udevadm control --reload-rules
            sudo udevadm trigger --subsystem-match=usb
          fi
          for dev in /sys/bus/usb/devices/*/idVendor; do
            [ "$(cat "$dev" 2>/dev/null)" = "38fb" ] || continue
            devdir=$(dirname "$dev")
            echo on | sudo tee "$devdir/power/control" > /dev/null 2>&1 || true
          done
          echo "USB autosuspend disabled for Reachy Mini (VID 38fb)"
        name_i18n:
          zh: 配置 USB 电源（禁用 Reachy 设备的自动挂起）
      - name: Auto-reconnect reachy-daemon when the robot is plugged in (udev)
        run: |
          # Why: reachy-mini-daemon scans `--serialport auto` ONCE at container start.
          # If the robot is plugged in / power-cycled AFTER the daemon is already
          # running, it never picks up the new /dev/ttyACM*, the SDK handshake times
          # out, and reachy-voice is stuck "Waiting for connection". This rule restarts
          # the daemon the moment the Reachy servo serial (1a86:55d3 -> ttyACM0)
          # enumerates, so plug/replug "just works" without a manual docker restart.
          RULE_FILE=/etc/udev/rules.d/99-reachy-daemon-reconnect.rules
          RULE_CONTENT='# Reachy Mini — auto-restart reachy-daemon when the servo serial bus appears.
          # Managed by sensecraft provisioning. Do not edit by hand.
          ACTION=="add", SUBSYSTEM=="tty", ENV{ID_VENDOR_ID}=="1a86", ENV{ID_MODEL_ID}=="55d3", RUN+="/usr/bin/systemd-run --no-block /usr/bin/docker restart reachy-daemon"'
          if [ ! -f "$RULE_FILE" ] || ! grep -q 'reachy-daemon' "$RULE_FILE"; then
            echo "Installing udev rule: $RULE_FILE"
            echo "$RULE_CONTENT" | sudo tee "$RULE_FILE" > /dev/null
            sudo udevadm control --reload-rules
            sudo udevadm trigger --subsystem-match=tty
          fi
          # If the serial is already present but the daemon started before it, restart now.
          if ls /dev/ttyACM* >/dev/null 2>&1 && docker ps --format '{{.Names}}' | grep -qx reachy-daemon; then
            echo "Reachy serial present — restarting reachy-daemon to (re)scan the port..."
            docker restart reachy-daemon >/dev/null 2>&1 || true
          fi
          echo "reachy-daemon auto-reconnect rule installed (serial VID 1a86/55d3)"
        name_i18n:
          zh: 机器人插入时自动重连 reachy-daemon（udev）
      - name: Create data directories
        run: |
          DATA_DIR="${DATA_DIR:-~/reachy-data}"
          mkdir -p "$DATA_DIR/reachy-voice" "$DATA_DIR/vision"
          echo "Data directories ready: $DATA_DIR"
        name_i18n:
          zh: 创建数据目录
    after:
      - name: Install kiosk auto-start
        when:
          field: ENABLE_KIOSK
          value: "true"
        run: |
          cat > ~/reachy-kiosk.sh << 'KIOSK_SCRIPT'
          #!/usr/bin/env bash
          DASHBOARD_URL="${DASHBOARD_URL:-http://localhost:8042}"
          MAX_WAIT=300

          echo "Waiting for dashboard at $DASHBOARD_URL ..."
          for ((i=1; i<=MAX_WAIT/5; i++)); do
              curl -s --max-time 2 "$DASHBOARD_URL/" > /dev/null 2>&1 && break
              sleep 5
          done

          echo "Launching kiosk: $DASHBOARD_URL"
          BROWSER=""
          for cmd in chromium-browser chromium google-chrome firefox; do
              if command -v "$cmd" > /dev/null 2>&1; then
                  BROWSER="$cmd"
                  break
              fi
          done

          if [ -z "$BROWSER" ]; then
              echo "ERROR: No browser found"
              exit 1
          fi

          case "$BROWSER" in
              *chromium*|*chrome*)
                  exec "$BROWSER" --kiosk --no-first-run --disable-translate --disable-infobars \
                      --disable-session-crashed-bubble --noerrdialogs \
                      --disable-features=TranslateUI \
                      "$DASHBOARD_URL"
                  ;;
              *firefox*)
                  exec "$BROWSER" --kiosk "$DASHBOARD_URL"
                  ;;
          esac
          KIOSK_SCRIPT
          chmod +x ~/reachy-kiosk.sh

          mkdir -p ~/.config/autostart
          cat > ~/.config/autostart/reachy-kiosk.desktop << DESKTOP_EOF
          [Desktop Entry]
          Type=Application
          Name=Reachy Dashboard Kiosk
          Comment=Auto-launch Reachy dashboard in fullscreen on login
          Exec=$HOME/reachy-kiosk.sh
          X-GNOME-Autostart-enabled=true
          X-GNOME-Autostart-Delay=10
          DESKTOP_EOF

          GDM_CONF="/etc/gdm3/custom.conf"
          if [ -f "$GDM_CONF" ]; then
            if ! grep -q "AutomaticLoginEnable" "$GDM_CONF"; then
              sudo sed -i '/\[daemon\]/a AutomaticLoginEnable=true\nAutomaticLogin={{username}}' "$GDM_CONF"
              echo "GDM auto-login enabled for {{username}}"
            else
              echo "GDM auto-login already configured"
            fi
          fi

          echo "Kiosk auto-start installed"
        ignore_error: true
        name_i18n:
          zh: 安装全屏展示模式自启动
  post_deployment:
    open_browser: true
    url: http://{{host}}:8042
