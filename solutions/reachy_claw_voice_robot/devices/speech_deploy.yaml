version: "1.0"
id: speech_deploy
name: Speech Service
type: docker_deploy

# Single source-of-truth device YAML. Backend derives docker_local and
# docker_remote views via derive_docker_views().
#
# device_class=jetson injects the shared iptables raw-table workaround
# (scope=remote, ignore_error=false) and /etc/nv_tegra_release detection
# probe from devices/profiles/jetson.yaml. The legacy speech.yaml hand-
# wrote an iptables fix named "JetPack 6.2" — byte-equivalent to the
# profile's "6.x" entry — and is removed here in favour of the profile.
device_class: jetson

docker:
  compose_file: assets/docker/speech/docker-compose.yml
  options:
    project_name: reachy-jetson-voice
  environment:
    OVS_PROFILE: "jetson-qwen3asr-moss-nx"
    LANGUAGE_MODE: "zh_en"
  services:
    - name: speech
      port: 8621
      health_check_endpoint: /health
      required: true

ssh:
  port: 22
  default_user: recomputer

pre_checks:
  - type: disk_space
    min_gb: 10
    description: At least 10GB for speech service Docker image

post_deployment:
  open_browser: true
  url: http://localhost:8621

name_i18n:
  zh: 语音服务

remote_overrides:
  remote_path: /home/{{username}}/reachy-jetson-voice
  compose_dir: assets/docker/speech
  detection:
    method: network_scan
    manual_entry: true
  environment:
    OVS_PROFILE: "{{OVS_PROFILE}}"
    LANGUAGE_MODE: "zh_en"
  pre_checks:
    - type: disk_space
      min_gb: 3
      description: At least 3GB for speech service Docker image
  post_deployment:
    open_browser: false
  user_inputs:
    - id: host
      name: Device IP
      type: text
      required: true
      name_i18n:
        zh: 设备 IP
    - id: username
      name: SSH Username
      type: text
      default: recomputer
      required: true
      name_i18n:
        zh: SSH 用户名
    - id: password
      name: SSH Password
      type: password
      required: true
      name_i18n:
        zh: SSH 密码
    - id: OVS_PROFILE
      name: Speech Profile (ASR + TTS)
      type: select
      default: "jetson-qwen3asr-moss-nx"
      reconfigurable: true
      description: "ASR + TTS engine combination. All options handle Chinese + English (Qwen3/Paraformer ASR are multilingual). moss gives the most natural, expressive voice (default voice: Yuewen); Matcha is a lighter fallback."
      options:
        - value: "jetson-qwen3asr-moss-nx"
          label: "Qwen3 ASR + MOSS-TTS-Nano (Yuewen voice) — recommended"
          label_i18n:
            zh: "Qwen3 ASR + MOSS-TTS-Nano（Yuewen 音色）— 推荐"
        - value: "jetson-qwen3asr-matcha-nx"
          label: "Qwen3 ASR + Matcha TTS (lighter fallback)"
          label_i18n:
            zh: "Qwen3 ASR + Matcha TTS（轻量备选）"
        - value: "jetson-zh-en"
          label: "Paraformer ASR + Matcha TTS (Chinese + English, lightweight)"
          label_i18n:
            zh: "Paraformer ASR + Matcha TTS（中文 + 英文，轻量）"
      name_i18n:
        zh: 语音方案（ASR + TTS）
      description_i18n:
        zh: "ASR + TTS 引擎组合。所有选项都支持中文 + 英文（Qwen3 / Paraformer ASR 均为多语种）。moss 音色最自然、表现力最强（默认音色 Yuewen）；Matcha 为轻量备选。"
      default_i18n:
        zh: "jetson-qwen3asr-moss-nx"
