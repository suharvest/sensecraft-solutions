# Conversation backend selection (the plugin, NOT the LLM).
# backend: slv → selects reachy_claw.plugins.conversation_plugin_slv, the thin
# client-loop conversation plugin proven on the slv-v6 image. The CLIENT drives
# turn detection (local VAD + pre-roll); the SLV engine does ASR+TTS pass-through.
conversation:
  backend: slv          # → conversation_plugin_slv
  mode: conversation    # listen + respond ("monologue" for idle self-talk)
  monologue_interval: 30.0

llm:
  backend: edge_llm_v2v
  # TensorRT-Edge-LLM OpenAI-compatible HTTP endpoint.
  # Port 11435 is chosen to avoid colliding with ollama's default 11434.
  # It matches the host port exposed by assets/docker/edge-llm/docker-compose.yml
  # (container :8000 -> host :11435).
  edge_llm_url: http://localhost:11435
  edge_llm_model: ""   # empty = auto-discover
  # System prompt for the SLV conversation turn. conversation_plugin_slv reads
  # this as the base prompt (it appends "/no_think" for qwen3, but we include it
  # here too so an operator sees the full intent).
  system_prompt: |
    You are Reachy, a cute robot at an exhibition. Always reply in English. No emoji.
    Reply in ONE short sentence (max 12 words). Be warm but brief — no filler, no lists, no follow-up questions unless asked.
    Names in [Faces: ...] are people you see, not your name.
    Never repeat or mention the [Faces: ...] tag in your reply.
    End with exactly one tag: [happy] [sad] [thinking] [surprised] [curious]
    Example: "Welcome! Glad you stopped by. [happy]"
    /no_think
  # Monologue (idle self-talk) prompt.
  monologue_prompt: |
    Your name is Reachy. You are a cheerful cute robot at an exhibition, mumbling happily to yourself. Always reply in English.
    Reply with ONE short sentence (max 15 words), then exactly ONE emotion tag. Nothing else.
    You love people and get excited when someone shows up. Stay upbeat and warm — find the bright side of everything.
    Names in [Faces: ...] are people you see. Use their name or "you" when talking about someone.
    Never repeat or mention the [Faces: ...] tag in your reply.
    You MUST end with one of: [happy] [sad] [thinking] [surprised] [curious] [excited] [laugh]
    /no_think

# V2V (ASR + TTS pass-through) is served by the existing Jetson speech container
# at :8621. With the slv backend the CLIENT drives turn detection, so server VAD
# is OFF (vad: none) and the plugin runs a local VAD with a pre-roll ring.
v2v:
  url: ws://localhost:8621/v2v/stream
  # Server VAD OFF — the client drives turn detection. The slv plugin forwards a
  # ~preroll_ms ring captured BEFORE speech onset (so the first word isn't
  # swallowed), and sends asr_eos after client_vad_silence_ms of trailing silence.
  vad: none
  client_vad_preroll_ms: 300 # audio retained ahead of speech onset
  client_vad_silence_ms: 400 # trailing silence → client asr_eos
  multi_utterance: true
  # Optional voice cloning. Leave commented out to use the OVS server
  # default voice. Both fields are forwarded into the V2V config frame
  # only when non-empty so older OVS builds keep their defaults.
  # voice_id: "custom_voice_001"               # OVS-registered voice id
  # voice_clone_sample: "/data/voices/sample.wav"  # optional clone sample

# Note: conversation.backend: slv selects conversation_plugin_slv, which (with
# llm.backend=edge_llm_v2v) owns ASR/VAD/TTS via the SLV engine. The top-level
# stt/tts/vad blocks below are ignored at runtime and kept only so falling back
# to backend=ollama via env override doesn't lose its configuration.
stt:
  backend: paraformer-streaming
  speech_service_url: http://localhost:8621

tts:
  backend: matcha
  speech_service_url: http://localhost:8621
  matcha:
    speaker_id: 3       # af_heart
    speed: 0.8
    pitch_shift: 1.5    # +1.5 semitones

vad:
  backend: silero

barge_in:
  enabled: true
  # Tuned for Reachy Mini speaker + close-range mic
  confirm_frames: 2
  energy_threshold: 0.03
  silero_threshold: 0.5
  cooldown_ms: 300

audio:
  device: "Reachy Mini Audio"
  volume: 3.5

reachy:
  serialport: auto
  spawn_daemon: false  # daemon runs as separate container
  connection_mode: localhost_only
  daemon_port: 38001
  # media_backend MUST be no_media on Jetson: the reachy-claw v1.20 container
  # is missing the unixfd GStreamer plugin, so the SDK's LOCAL backend fails
  # when constructing unixfdsrc and falls back to SIM (motors stop moving).
  # NO_MEDIA skips the LOCAL audio/video path entirely; motors continue to
  # work via the reachy-daemon FastAPI on :38001, and V2V TTS audio falls
  # back to a sounddevice OutputStream (see ConversationPlugin._play_v2v_pcm).
  media_backend: no_media

vision:
  camera_source: sdk
  tracker: remote

dashboard:
  enabled: true
  port: 8640
  # Containers to restart from the dashboard restart button.
  # Order matters: vision-trt first (camera lock), edge-llm + voice
  # independently, reachy-claw last (depends on others).
  # NOTE: speech container name is "reachy-jetson-voice-speech-1" because the
  # speech compose project_name is "reachy-jetson-voice" (see
  # devices/speech_deploy.yaml docker.options.project_name), NOT "deploy".
  restart_containers:
    - "vision-trt:true"             # wait_healthy: camera lock
    - "edge-llm-chat-service:true"  # wait_healthy: long startup
    - "reachy-jetson-voice-speech-1:false"
    - "reachy-daemon:false"
    - "reachy-claw:false"

plugins:
  face_tracker: true
