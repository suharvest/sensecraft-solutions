# Reachy Mini Voice Robot — Jetson deployment stack.
#
# Base services (always started):
#   docker compose up -d
#
# With vision (face detection + emotion + tracking):
#   docker compose --profile vision up -d
#
# Data directory:
#   All persistent data (captures, face DB, etc.) is stored under DATA_DIR.
#   Default: ~/reachy-data   Override: DATA_DIR=/path/to/dir docker compose up -d

services:
  # ── Always-on services ────────────────────────────────────────────

  reachy-daemon:
    image: sensecraft-missionpack.seeed.cn/solution/reachy-daemon:v1.0
    container_name: reachy-daemon
    restart: unless-stopped
    network_mode: host
    privileged: true
    command: >-
      reachy-mini-daemon
      --serialport ${SERIAL_PORT:-auto}
      --localhost-only
      --deactivate-audio
      --fastapi-port 38001
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:38001/', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Reachy Voice app (client-loop architecture): mic → Qwen3 ASR (SLV :8621)
  # → Qwen3.5-4B LLM (edge-llm :11435) → MOSS-TTS-Nano (Yuewen) → emotion/motion.
  # Drives the robot via reachy-daemon :38001. The app owns the turn loop; the
  # SLV speech backend is pure ASR+TTS pass-through over the /v2v WebSocket.
  # cm4/hailo presets point speech/LLM at a remote Jetson via ${VOICE_ASSISTANT_HOST}.
  reachy-voice:
    image: sensecraft-missionpack.seeed.cn/solution/reachy-voice:v0.5.0
    container_name: reachy-voice
    restart: unless-stopped
    network_mode: host
    privileged: true            # ALSA audio device + udev
    volumes:
      - /dev/shm:/dev/shm
      - /run/udev:/run/udev:ro
      # Dashboard "restart services" drives the Docker Engine API over this socket.
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_DIR:-~/reachy-data}/reachy-voice:/data
      # Operator overrides (client VAD threshold / mic makeup gain / TTS speed /
      # language). load_config keeps only known fields, so unknown keys are safe.
      - ./reachy-voice.yaml:/data/reachy-voice.yaml:ro
      # Daemon-readiness wait (cold-boot race fix) + exhibition persona prompt.
      - ./entrypoint.sh:/opt/reachy-voice/entrypoint.sh:ro
      - ./instructions.txt:/opt/reachy-voice/reachy_voice/profiles/exhibition/instructions.txt:ro
    environment:
      - NO_PROXY=localhost,127.0.0.1
      - REACHY_DAEMON_PORT=38001
      - REACHY_VOICE_CONFIG=/data/reachy-voice.yaml
      - REACHY_VOICE_DATA_DIR=/data
      - REACHY_LOG_LEVEL=INFO
      # Speech (SLV) + LLM endpoints. Default localhost (jetson all-in-one).
      # cm4/hailo presets set VOICE_ASSISTANT_HOST to the remote Jetson.
      - VOICE_ASSISTANT_HOST=${VOICE_ASSISTANT_HOST:-127.0.0.1}
    depends_on:
      reachy-daemon:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Vision TRT (opt-in via --profile vision) ───────────────────────

  vision-trt:
    profiles: ["vision"]
    image: sensecraft-missionpack.seeed.cn/solution/vision-trt:v2.1
    container_name: vision-trt
    restart: unless-stopped
    network_mode: host
    runtime: nvidia
    devices:
      - ${CAMERA_DEVICE:-/dev/video0}:${CAMERA_DEVICE:-/dev/video0}
    volumes:
      # Persistent TRT engine cache (avoid rebuild on restart)
      - vision-trt-engines:/app/engines
      # Persistent data (captures, face DB) — bind mount to host for easy access
      - ${DATA_DIR:-~/reachy-data}/vision:/app/data
      # Host GPU runtime libs (JetPack 6.x) — unified mount pattern
      - /usr/local/cuda/lib64:/host-cuda:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/host-nvidia-libs:ro
      - /lib/aarch64-linux-gnu:/host-libs:ro
      # Host TensorRT Python + GStreamer plugins
      - /usr/lib/python3.10/dist-packages/tensorrt:/usr/lib/python3.10/dist-packages/tensorrt:ro
      - /usr/lib/aarch64-linux-gnu/gstreamer-1.0:/host-gst-plugins:ro
      - /run/udev:/run/udev:ro
    privileged: true
    deploy:
      resources:
        limits:
          memory: 4G
    environment:
      - LD_LIBRARY_PATH=/host-nvidia-libs:/host-libs:/host-cuda
      - GST_PLUGIN_PATH=/host-gst-plugins
      - GST_V4L2_USE_LIBV4L2=1
      - CAMERA_DEVICE=${CAMERA_DEVICE:-/dev/video0}
      - ZMQ_PUB_PORT=8631
      - HTTP_PORT=8630
      - STREAM_PORT=8632
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8630/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s  # TRT engine build can take 5+ min on first boot
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vision-trt-engines:
