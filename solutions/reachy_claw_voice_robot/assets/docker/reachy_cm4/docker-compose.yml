# Reachy Mini Voice Robot — CM4 deployment stack.
#
# Services:
#   docker compose up -d
#
# Data directory:
#   All persistent data (captures, face DB, etc.) is stored under DATA_DIR.
#   Default: ~/reachy-data   Override: DATA_DIR=/path/to/dir docker compose up -d

services:
  # ── Always-on services ────────────────────────────────────────────

  reachy-daemon:
    image: sensecraft-missionpack.seeed.cn/solution/reachy-daemon:v1.0
    container_name: reachy-daemon
    restart: unless-stopped
    network_mode: host
    privileged: true
    command: >-
      reachy-mini-daemon
      --serialport ${SERIAL_PORT:-auto}
      --localhost-only
      --deactivate-audio
      --fastapi-port 38001
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:38001/', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  reachy-claw:
    image: sensecraft-missionpack.seeed.cn/solution/reachy-claw:slv-v6
    container_name: reachy-claw
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - ./reachy-claw.cm4.yaml:/app/reachy-claw.yaml:ro
      - ${DATA_DIR:-~/reachy-data}/reachy-claw:/app/data
      - /dev/shm:/dev/shm
      - /run/udev:/run/udev:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATA_DIR=/app/data
      - HOST_DATA_DIR=${DATA_DIR:-~/reachy-data}
      - VISION_SERVICE_URL=tcp://127.0.0.1:8631
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://${VOICE_ASSISTANT_HOST}:11435}
      - SPEECH_SERVICE_URL=http://${VOICE_ASSISTANT_HOST}:8621
      - VOICE_ASSISTANT_HOST=${VOICE_ASSISTANT_HOST}
      - REACHY_MOTOR_ENABLED=true
    depends_on:
      reachy-daemon:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8640/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Vision (CM4) ──────────────────────────────────────────────────

  vision-cm4:
    image: sensecraft-missionpack.seeed.cn/solution/vision-cm4:v0.1
    container_name: vision-cm4
    restart: unless-stopped
    network_mode: host
    devices:
      - ${CAMERA_DEVICE:-/dev/video0}:${CAMERA_DEVICE:-/dev/video0}
    volumes:
      - ${DATA_DIR:-~/reachy-data}/vision:/var/lib/vision-cm4
      - /run/udev:/run/udev:ro
    environment:
      - ZMQ_PUB_PORT=8631
      - HTTP_PORT=8630
      - CAMERA_DEVICE=${CAMERA_DEVICE:-/dev/video0}
      - CAPTURE_DIR=/var/lib/vision-cm4/captures
      - FACE_DB_DIR=/var/lib/vision-cm4/faces
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8630/', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
