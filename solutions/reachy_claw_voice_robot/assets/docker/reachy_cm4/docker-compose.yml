# Reachy Mini Voice Robot — CM4 deployment stack.
#
# Services:
#   docker compose up -d
#
# Data directory:
#   All persistent data (captures, face DB, etc.) is stored under DATA_DIR.
#   Default: ~/reachy-data   Override: DATA_DIR=/path/to/dir docker compose up -d

services:
  # ── Always-on services ────────────────────────────────────────────

  reachy-daemon:
    image: sensecraft-missionpack.seeed.cn/solution/reachy-daemon:v1.0
    container_name: reachy-daemon
    restart: unless-stopped
    network_mode: host
    privileged: true
    command: >-
      reachy-mini-daemon
      --serialport ${SERIAL_PORT:-auto}
      --localhost-only
      --deactivate-audio
      --fastapi-port 38001
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:38001/', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Reachy Voice app (client-loop). Wireless CM4 preset: speech (SLV) + LLM run
  # on a REMOTE Jetson (set VOICE_ASSISTANT_HOST); vision runs locally (vision-cm4
  # :8631, config.py's default). The app drives the robot via reachy-daemon :38001.
  reachy-voice:
    image: sensecraft-missionpack.seeed.cn/solution/reachy-voice:v0.5.0
    container_name: reachy-voice
    restart: unless-stopped
    network_mode: host
    privileged: true            # ALSA audio device + udev
    volumes:
      - /dev/shm:/dev/shm
      - /run/udev:/run/udev:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_DIR:-~/reachy-data}/reachy-voice:/data
      - ./reachy-voice.yaml:/data/reachy-voice.yaml:ro
      - ./entrypoint.sh:/opt/reachy-voice/entrypoint.sh:ro
      - ./instructions.txt:/opt/reachy-voice/reachy_voice/profiles/exhibition/instructions.txt:ro
    environment:
      - NO_PROXY=localhost,127.0.0.1
      - REACHY_DAEMON_PORT=38001
      - REACHY_VOICE_CONFIG=/data/reachy-voice.yaml
      - REACHY_VOICE_DATA_DIR=/data
      - REACHY_LOG_LEVEL=INFO
      # Speech + LLM on the remote Jetson; vision is local (default 127.0.0.1:8631).
      - VOICE_ASSISTANT_HOST=${VOICE_ASSISTANT_HOST}
      - REACHY_V2V_URL=ws://${VOICE_ASSISTANT_HOST}:8621/v2v/stream
      # LLM_ENDPOINT (optional) overrides the LLM base URL; must be an
      # OpenAI-compatible base INCLUDING /v1. Empty → the bundled edge-llm.
      - REACHY_EDGE_LLM_URL=${LLM_ENDPOINT:-http://${VOICE_ASSISTANT_HOST}:11435/v1}
    depends_on:
      reachy-daemon:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Vision (CM4) ──────────────────────────────────────────────────

  vision-cm4:
    image: sensecraft-missionpack.seeed.cn/solution/vision-cm4:v0.1
    container_name: vision-cm4
    restart: unless-stopped
    network_mode: host
    devices:
      - ${CAMERA_DEVICE:-/dev/video0}:${CAMERA_DEVICE:-/dev/video0}
    volumes:
      - ${DATA_DIR:-~/reachy-data}/vision:/var/lib/vision-cm4
      - /run/udev:/run/udev:ro
    environment:
      - ZMQ_PUB_PORT=8631
      - HTTP_PORT=8630
      - CAMERA_DEVICE=${CAMERA_DEVICE:-/dev/video0}
      - CAPTURE_DIR=/var/lib/vision-cm4/captures
      - FACE_DB_DIR=/var/lib/vision-cm4/faces
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8630/', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
