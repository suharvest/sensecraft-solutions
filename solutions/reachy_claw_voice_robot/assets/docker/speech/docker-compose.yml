services:
  speech:
    # Unified slim speech image: serves both server-loop and client-loop modes.
    # For reachy (client-loop / V2V pass-through), keep the V2V flags UNSET
    # (OVS_V2V_SERVER_LOOP / OVS_V2V_ENGINE absent = flag OFF = ASR+TTS pass-through).
    # moss-enabled slim speech image: Qwen3 ASR + MOSS-TTS-Nano (MIX1 engines:
    # fp32 global prefill/decode + bf16 local), default voice Yuewen. Client-loop
    # / V2V pass-through (keep V2V flags UNSET). moss has no native speed knob —
    # speech rate is driven by the reachy-voice client's slv_config `tts_speed`.
    image: sensecraft-missionpack.seeed.cn/solution/seeed-local-voice:prod-unified-v8-moss
    runtime: nvidia
    ipc: host
    ports:
      - "8621:8000"
    environment:
      - LANGUAGE_MODE=${LANGUAGE_MODE:-zh_en}
      - OVS_PROFILE=${OVS_PROFILE:-jetson-qwen3asr-moss-nx}
      - OVS_PROFILE_JSON=${OVS_PROFILE_JSON:-}
      - OVS_VAD_BACKEND=${OVS_VAD_BACKEND:-silero}
      - OVS_ADMIN_KEY=${OVS_ADMIN_KEY:-}
      - OVS_VAD_SILENCE_MS=${OVS_VAD_SILENCE_MS:-400}
      # moss MIX1 engines + Yuewen manifest are pulled into the speech-models
      # volume on first boot. NOTE: the HF artifacts repo must carry the MIX1
      # (fp32-global) engines — the older fp16 set collapses on long text.
      - MOSS_ARTIFACT_AUTO_DOWNLOAD=${MOSS_ARTIFACT_AUTO_DOWNLOAD:-1}
      - QWEN3_EDGELLM_JETSON_ROOT=${QWEN3_EDGELLM_JETSON_ROOT:-/opt/qwen3-edgellm-jetson}
      - QWEN3_ARTIFACT_ROOT=${QWEN3_ARTIFACT_ROOT:-/opt/models/qwen3-edgellm}
      - QWEN3_HF_REVISION=${QWEN3_HF_REVISION:-main}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://huggingface.co}
      - TTS_PROVIDER=${TTS_PROVIDER:-cuda}
      - PARAFORMER_PREROLL_MS=${PARAFORMER_PREROLL_MS:-100}
      - TTS_NUM_THREADS=4
      - STREAMING_ASR_PROVIDER=cuda
      - STREAMING_ASR_NUM_THREADS=4
      - CUDA_MODULE_LOADING=LAZY
      - LD_LIBRARY_PATH=/usr/local/lib/python3.10/dist-packages/onnxruntime/capi:/host-cuda:/host-nvidia-libs:/host-libs
      - PYTHONPATH=/opt/speech:/usr/lib/python3.10/dist-packages
      - ORT_CUDA_ARENA_EXTEND_STRATEGY=kSameAsRequested
    volumes:
      - speech-models:/opt/models
      - /usr/local/cuda/lib64:/host-cuda:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/host-nvidia-libs:ro
      - /lib/aarch64-linux-gnu:/host-libs:ro
      - /usr/lib/python3.10/dist-packages/tensorrt:/usr/lib/python3.10/dist-packages/tensorrt:ro
      - /usr/src/tensorrt:/usr/src/tensorrt:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${OVS_MEMORY_LIMIT:-6G}

volumes:
  speech-models:
    name: speech-models
